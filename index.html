<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会议预告｜CACA前沿播第46期</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f7fb;
      color: #1f2937;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 750px;
      margin: 0 auto;
      background: #ffffff;
      min-height: 100vh;
    }

    .hero img,
    .poster-long img {
      display: block;
      width: 100%;
      height: auto;
    }

    .section {
      padding: 18px 16px;
    }

    .countdown-wrap {
      background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      padding: 20px 16px 10px;
      text-align: center;
    }

    .countdown-title {
      font-size: 16px;
      font-weight: bold;
      color: #1d4ed8;
      margin-bottom: 14px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .countdown .item {
      text-align: center;
    }

    .countdown .box {
      width: 68px;
      height: 68px;
      border-radius: 12px;
      background: linear-gradient(180deg, #315eea 0%, #2247c7 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.22);
    }

    .countdown .label {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .intro-card {
      margin: 14px 16px 0;
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      line-height: 1.9;
      font-size: 15px;
      color: #374151;
    }

    .meta {
      margin: 14px 16px 0;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    .live-btn {
      padding: 18px 16px 24px;
    }

    .live-btn a {
      display: block;
      width: 100%;
      text-align: center;
      background: linear-gradient(90deg, #2f63f1 0%, #2563eb 100%);
      color: #fff;
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    .poster-long {
      margin-top: 8px;
      border-top: 8px solid #f4f7fb;
    }

    .bottom-space {
      height: 20px;
      background: #f4f7fb;
    }

    @media (max-width: 480px) {
      .countdown .box {
        width: 62px;
        height: 62px;
        font-size: 24px;
      }

      .intro-card {
        font-size: 14px;
        line-height: 1.85;
      }

      .live-btn a {
        font-size: 18px;
        padding: 15px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- 顶部完整主图 -->
    <div class="hero">
      <img src="./cover.jpg" alt="CACA前沿播主视觉海报">
    </div>

    <!-- 倒计时 -->
    <div class="countdown-wrap">
      <div class="countdown-title">直播倒计时</div>
      <div class="countdown">
        <div class="item">
          <div class="box" id="d">00</div>
          <div class="label">天</div>
        </div>
        <div class="item">
          <div class="box" id="h">00</div>
          <div class="label">时</div>
        </div>
        <div class="item">
          <div class="box" id="m">00</div>
          <div class="label">分</div>
        </div>
        <div class="item">
          <div class="box" id="s">00</div>
          <div class="label">秒</div>
        </div>
      </div>
    </div>

    <!-- 简介 -->
    <div class="intro-card">
      由中国抗癌协会主办的“CACA前沿播（第46期）”，将于 2026年3月23日（周一）19:00–20:30 在线上举行。届时，主创团队广州医科大学附属第一医院何建行教授、李望忠研究员，广西医科大学第一附属医院康敏教授将在直播间分享最新研究成果，为抗癌领域的发展添砖加瓦。
    </div>

    <div class="meta">来源：ROMA肺癌罕见靶点公众号</div>

    <!-- 按钮 -->
    <div class="live-btn">
      <a href="http://pull-t1.videocc.net/recordf/657dcf655b1738892800574a03c.m3u8?txSecret=eae54574fccb1a79300599253becf004&txTime=69c49587" target="_blank">
        👉 点击进入直播间
      </a>
    </div>

    <!-- 下方长图 -->
    <div class="poster-long">
      <img src="./long.jpg" alt="活动详情长图">
    </div>

    <div class="bottom-space"></div>
  </div>

  <script>
    function countDown() {
      const end = new Date("2026-03-23T19:00:00").getTime();
      const now = new Date().getTime();
      const dis = end - now;

      if (dis <= 0) {
        document.getElementById("d").innerText = "00";
        document.getElementById("h").innerText = "00";
        document.getElementById("m").innerText = "00";
        document.getElementById("s").innerText = "00";
        return;
      }

      const d = Math.floor(dis / (1000 * 60 * 60 * 24));
      const h = Math.floor((dis % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((dis % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((dis % (1000 * 60)) / 1000);

      document.getElementById("d").innerText = String(d).padStart(2, "0");
      document.getElementById("h").innerText = String(h).padStart(2, "0");
      document.getElementById("m").innerText = String(m).padStart(2, "0");
      document.getElementById("s").innerText = String(s).padStart(2, "0");
    }

    setInterval(countDown, 1000);
    countDown();
  </script>
</body>
</html>
