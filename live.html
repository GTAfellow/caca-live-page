<body>
<div class="title">CACA前沿播（第46期）CA：全球儿童癌症统计：变迁与预测</div>

<div class="content">
由中国抗癌协会主办的“CACA 前沿播（第46期）”，将于 2026年3月23日（周一）19:00-20:30 在线上举行。届时，主创团队广州医科大学附属第一医院何建行教授、李望忠研究员，广西医科大学第一附属医院康敏教授将在直播间分享最新研究成果，为抗癌领域的发展添砖加瓦。
</div>

<div class="countdown">
<div>
<div class="box" id="d">00</div>
<div class="label">天</div>
</div>
<div>
<div class="box" id="h">00</div>
<div class="label">时</div>
</div>
<div>
<div class="box" id="m">00</div>
<div class="label">分</div>
</div>
<div>
<div class="box" id="s">00</div>
<div class="label">秒</div>
</div>
</div>

<div class="bottom">来源：ROMA肺癌罕见靶点公众号</div>

<script>
function countDown() {
  let end = new Date("2026-03-23 19:00:00").getTime();
  let now = new Date().getTime();
  let dis = end - now;

  let d = Math.floor(dis / (1000*60*60*24));
  let h = Math.floor((dis % (1000*60*60*24)) / (1000*60*60));
  let m = Math.floor((dis % (1000*60*60)) / (1000*60));
  let s = Math.floor((dis % (1000*60)) / 1000);

  document.getElementById("d").innerText = String(d).padStart(2, '0');
  document.getElementById("h").innerText = String(h).padStart(2, '0');
  document.getElementById("m").innerText = String(m).padStart(2, '0');
  document.getElementById("s").innerText = String(s).padStart(2, '0');
}
setInterval(countDown, 1000);
countDown();
</script>
